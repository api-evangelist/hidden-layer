aid: hidden-layer
name: HiddenLayer
description: >-
  HiddenLayer is an Austin, Texas-based AI security company founded in March
  2022 by Chris Sestito (CEO), Tanner Burns (Chief Scientist), and Jim Ballard
  (CIO) — former Cylance researchers who encountered a real-world attack on
  production ML models. HiddenLayer builds an AI Security Platform that
  protects machine learning and generative AI systems across their entire
  lifecycle, comprising four integrated modules: AI Discovery (catalogs AI
  assets and eliminates shadow AI), AI Supply Chain Security (Model Scanner
  inspects models, weights, and pickle/RDS files for malicious payloads and
  backdoors), AI Attack Simulation (continuous adversarial red-teaming for
  agentic and generative systems), and AI Runtime Security / AIDR (a real-time
  detection-and-response firewall using deterministic classifiers that sit
  outside the model inference path to detect prompt injection, jailbreaks,
  indirect attacks, data leakage, and malicious tool calls in agentic and MCP
  systems). The platform exposes native connectors for CI/CD, MLOps, SIEM/SOAR,
  API gateways, and major data and cloud platforms, plus guardrail integrations
  for OpenAI Agents, LangChain, AWS Strands, Microsoft Agent Framework, Azure
  APIM, and a GitHub Action for Model Scanner. HiddenLayer publishes Python,
  TypeScript, and Java/Kotlin SDKs and research-grade tooling such as
  HiddenPickle (Python pickle disassembler/patcher) and HiddenPromise (R
  .rdx/.rdb/.rds disassembler). The company has raised $56M total ($50M Series
  A in September 2023 led by M12 / Microsoft's Venture Fund and Moore Strategic
  Ventures, with Booz Allen Ventures, IBM Ventures, Capital One Ventures, and
  Ten Eleven Ventures participating) and serves Fortune 500 enterprises,
  financial services, and US Federal agencies. The HiddenLayer SaaS console and
  REST API are gated behind enterprise sales and not publicly self-serve,
  placing this profile in Tier-3 (enterprise-gated) coverage.
